<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        /* 纯白背景，极致精简 */
        html, body { margin: 0; padding: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: -apple-system, sans-serif; }
        #ui { display: none; text-align: center; }
        .loader { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #25D366; border-radius: 50%; animation: s 0.6s linear infinite; margin: 0 auto 12px; }
        @keyframes s { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="ui">
        <div class="loader"></div>
        <p style="color: #666; font-size: 14px;">Connecting to support...</p>
    </div>

    <script>
    (function() {
        // --- 你的最新 Web 应用 URL ---
        const API_URL = "https://script.google.com/macros/s/AKfycbxaPzWyfb2Umi0rK75ybMS889KiH1kgrvneMlFFd6njh2qKR_xEjpDHViRFX3IRiiY/exec";
        
        const KEY_POOL = "wa_pool_final";
        const KEY_IDX = "wa_idx_final";

        // 读取本地缓存的号码池
        let pool = [];
        try { 
            pool = JSON.parse(localStorage.getItem(KEY_POOL) || "[]"); 
        } catch(e) { pool = []; }

        // --- 逻辑判断 ---
        if (pool.length > 0) {
            // 1. 如果有缓存，立即计算要跳哪个号
            let idx = parseInt(localStorage.getItem(KEY_IDX) || "0");
            if (idx >= pool.length) idx = 0;
            const target = pool[idx];
            localStorage.setItem(KEY_IDX, idx + 1);
            
            // 2. 【核心】瞬间跳转（不等待网络，直接切走）
            window.location.replace("https://wa.me/" + target);
            
            // 3. 【后台静默上报】利用图片请求原理，给表格数字 +1
            var logger = new Image();
            logger.src = API_URL + "?mode=log&phone=" + target;
            
            // 4. 【异步更新】偷偷去表格拿一下最新的号码名单，为下次点击做准备
            fetchLatestPool();
        } else {
            // 第一次访问（没缓存），显示加载动画并等待下载
            document.getElementById('ui').style.display = 'block';
            fetchLatestPool(true);
        }

        // 从 Google 脚本获取最新号码名单的函数
        function fetchLatestPool(isFirstTime) {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", API_URL + "?mode=get_all", true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    try {
                        const latestNums = JSON.parse(xhr.responseText);
                        if (Array.isArray(latestNums) && latestNums.length > 0) {
                            // 存入手机本地，下次就是秒开
                            localStorage.setItem(KEY_POOL, JSON.stringify(latestNums));
                            // 如果是第一次访问，拿到后立刻跳走
                            if (isFirstTime) {
                                window.location.replace("https://wa.me/" + latestNums[0]);
                                // 同时也报一下数
                                new Image().src = API_URL + "?mode=log&phone=" + latestNums[0];
                            }
                        }
                    } catch(e) { console.error("Data error"); }
                }
            };
            xhr.send();
        }
    })();
    </script>
</body>
</html>
