<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting...</title>
    <style>
        html, body { margin: 0; padding: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; }
        .loader { width: 24px; height: 24px; border: 3px solid #f3f3f3; border-top: 3px solid #25D366; border-radius: 50%; animation: s 0.6s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }
        iframe { border: none; width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="ui"><div class="loader"></div></div>
    <iframe id="adminFrame"></iframe>

    <script>
    (function() {
        const API_URL = "https://script.google.com/macros/s/AKfycbxaPzWyfb2Umi0rK75ybMS889KiH1kgrvneMlFFd6njh2qKR_xEjpDHViRFX3IRiiY/exec";
        
        // 【本地静态池】确保第一次访问的绝对速度
        const STATIC_POOL = ["8613800000001", "8613800000002", "8613800000003", "8613800000004"];

        const urlParams = new URLSearchParams(window.location.search);
        
        // 1. 看板后台逻辑
        if (urlParams.get('view') === 'admin') {
            document.getElementById('ui').style.display = 'none';
            var frame = document.getElementById('adminFrame');
            frame.src = API_URL + "?view=admin";
            frame.style.display = "block";
            return;
        }

        // 2. 智能选号逻辑
        // 优先获取“未满额”的号码池，如果没有，就用全量静态池
        let availablePool = JSON.parse(localStorage.getItem('wa_available_pool') || "[]");
        if (availablePool.length === 0) {
            availablePool = STATIC_POOL;
        }

        // 随机选一个号
        const target = availablePool[Math.floor(Math.random() * availablePool.length)];
        
        // 3. 【立即跳转】
        window.location.replace("https://wa.me/" + target);

        // 4. 【异步静默同步】更新下一次的号码池状态
        // A. 记录本次点击
        new Image().src = `${API_URL}?mode=log&phone=${target}&t=${Date.now()}`;

        // B. 获取表格最新状态（避开已满额的号）
        var xhr = new XMLHttpRequest();
        xhr.open("GET", API_URL + "?mode=get_all", true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState === 4 && xhr.status === 200) {
                try {
                    const latestNums = JSON.parse(xhr.responseText);
                    if (latestNums && latestNums.length > 0) {
                        // 这里的 latestNums 必须是 Google 脚本中过滤掉“状态关闭”和“已满额”后的号码
                        localStorage.setItem('wa_available_pool', JSON.stringify(latestNums));
                    } else {
                        // 如果全部都满了，下次就随机乱跳（兜底）
                        localStorage.setItem('wa_available_pool', JSON.stringify(STATIC_POOL));
                    }
                } catch(e) {}
            }
        };
        xhr.send();

    })();
    </script>
</body>
</html>
