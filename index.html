<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link rel="dns-prefetch" href="//script.google.com">
    <link rel="preconnect" href="https://script.google.com" crossorigin>
    <script>
        // 1. 最原始的 XHR 请求，比 Fetch 更快触发
        var x = new XMLHttpRequest();
        x.open("GET", "你的GOOGLE脚本链接", true);
        x.onreadystatechange = function() {
            if (x.readyState === 4 && x.status === 200) {
                var p = x.responseText.trim();
                if (p !== "full" && p.length > 5) {
                    // 2. 瞬间重定向
                    location.replace("https://wa.me/" + p);
                } else {
                    document.body.innerHTML = "Full";
                }
            }
        };
        x.send();
    </script>
</head>
<body style="background:#fff"></body>
</html>
